name: Release npm package
on:
  workflow_dispatch:
    inputs:
      version-bump:
        description: The scale of the version bump required for semver compatibility
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
concurrency: release
jobs:
  release:
    name: "Release & Publish"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: 🧮 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.ELEMENT_BOT_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: pnpm cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache: "pnpm"
          node-version-file: ".node-version"

      - name: 🛠️ Setup
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 🚧 Build
        run: pnpm build

      - name: 👊 Bump version
        run: |
          pnpm version --no-git-tag-version ${{ github.event.inputs.version-bump }}
          git config --global user.name 'ElementRobot'
          git config --global user.email 'releases@riot.im'
          git commit -am "${{ github.event.inputs.version-bump }} version bump"
          git push

      - name: 🚀 Publish to npm
        id: npm-publish
        run: |
          npm publish --access public --provenance
          echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: 🧬 Create release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.npm-publish.outputs.version }}
          release_name: Release ${{ steps.npm-publish.outputs.version }}
          body: ${{ steps.npm-publish.outputs.version }} Release
          draft: false
          prerelease: false
